<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset='UTF-8'>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Memento Mori/Memoir</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div id="Base">
            <div class="bg-dark text-secondary px-4 py-5 text-center min-vh-100 d-flex align-items-center justify-content-center"> 
                <div class="py-5"> 
                    
                    <!-- Unified Column Wrapper: Locks the maximum width for everything, including the headline -->
                    <div class="mx-auto d-flex flex-column align-items-center gap-4" style="max-width: 400px; width: 100%;">
                        
                        <!-- 1. Headline (Moved inside the 400px block and fully justified) -->
                        <h2 class="display-6 fw-bold text-white m-0" style="text-align: justify; width: 100%;">
                            How many days have you got left?
                        </h2>

                        <!-- 2. Paragraph (Fully justified like MS Word) -->
                        <p class="fs-6 m-0" style="text-align: justify; width: 100%;">
                            None of us will live forever. Yet, we waste so much time, drifting away from our goals and dreams.
                            This project aims to calculate how many days you have left by taking your birth year and the age you expect to die.
                        </p> 
                        
                        <!-- 3. Responsive Image -->
                        <img src="./mementoMoriMemoir.png" alt="Abstract art on Memento Mori Memoir" class="img-fluid rounded w-100" style="height: auto; object-fit: cover;">
                        
                        <!-- 4. Form Box (Spans 100% of the 400px wrapper width) -->
                        <form class="p-4 border rounded-3 bg-dark border-secondary w-100"> 
                            <div class="form-floating mb-3 text-start text-dark"> 
                                <input type="number" class="form-control" id="birthYear" placeholder="e.g. 1995"> 
                                <label for="birthYear">Birth Year</label> 
                            </div> 
                            <div class="form-floating mb-3 text-start text-dark"> 
                                <input type="number" class="form-control" id="deathAge" placeholder="e.g. 80"> 
                                <label for="deathAge">Death Age</label> 
                            </div>
                            
                            <!-- Buttons stack on tiny screens, fit nicely side-by-side on 400px width -->
                            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                                <button type="button" onclick="calculateDays()" class="btn btn-outline-info btn-md px-4 fw-bold">Calculate</button> 
                                <button type="button" onclick="resetForm()" class="btn btn-outline-light btn-md px-4">Reset</button>
                            </div>
                            
                            <h3 id="resultContainer" class="text-danger mt-4 fs-4 fw-bold"></h3>
                        </form>    
                    </div> 

                </div> 
            </div>
        </div>
        
        <script>
            function calculateDays() {
                const year_of_birth = parseInt(document.getElementById('birthYear').value);
                const estimated_death_age = parseInt(document.getElementById('deathAge').value);
                
                if (isNaN(year_of_birth) || isNaN(estimated_death_age)) {
                    document.getElementById('resultContainer').innerText = "Please enter valid numbers.";
                    return;
                }

                const current_year = new Date().getFullYear();
                const your_age = current_year - year_of_birth;
                const years_left = estimated_death_age - your_age;
                const days_left = years_left * 365;

                if (days_left < 0) {
                    document.getElementById('resultContainer').innerText = "You've outlived your estimate!";
                } else {
                    document.getElementById('resultContainer').innerText = `Only ${days_left.toLocaleString()} days left!`;
                }
            }

            function resetForm() {
                document.getElementById('birthYear').value = '';
                document.getElementById('deathAge').value = '';
                document.getElementById('resultContainer').innerText = '';
            }
        </script>
    </body>
</html>
